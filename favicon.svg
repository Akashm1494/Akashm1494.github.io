<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgb(0,210,190);stop-opacity:1" />
      <stop offset="100%" style="stop-color:rgb(0,180,220);stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#0a0f1a"/>
  
  <!-- AM Text -->
  <text x="50" y="70" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="url(#grad)" text-anchor="middle">AM</text>
  
  <!-- Accent line -->
  <rect x="20" y="80" width="60" height="3" rx="1.5" fill="url(#grad)"/>
</svg>
